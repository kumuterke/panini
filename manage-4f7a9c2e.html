<!doctype html><html lang="tr"><head><meta charset="utf-8"><meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"><meta http-equiv="Pragma" content="no-cache"><meta http-equiv="Expires" content="0"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Inventory Control</title><link rel="stylesheet" href="assets/app.css"></head><body>
<main class="wrap"><section id="loginBox" class="panel login"><h1>Inventory Control</h1><p class="sub">Only authorized accounts can change inventory.</p><input id="email" type="email" placeholder="Admin email" autocomplete="username" style="margin-bottom:10px"><input id="password" type="password" placeholder="Password" autocomplete="current-password" style="margin-bottom:10px"><button id="login" class="btn primary" style="width:100%">Sign in</button><div id="loginMsg" class="sub" style="margin-top:10px;white-space:pre-wrap"></div></section>
<section id="adminBox" class="hidden"><header style="padding-left:0;padding-right:0"><div class="top"><div><div class="logo">INVENTORY <span>CONTROL</span></div><div class="sub">Authenticated admin panel</div></div><button id="logout" class="btn secondary">Sign out</button></div></header>
<div class="panel"><div id="msg" class="status">Ready.</div><div class="admin-grid"><input id="team" maxlength="4" placeholder="Code"><input id="name" placeholder="Country / team"><input id="num" type="number" min="1" placeholder="Number"><input id="player" placeholder="Player / sticker name"><input id="qty" type="number" min="1" value="1" placeholder="Quantity"><input id="img" placeholder="Image URL (optional)"><label class="file-label">Fotoğraf seç<input id="photo" type="file" accept="image/jpeg,image/png,image/webp" hidden></label><button id="add" class="btn primary">Add</button></div>
<div class="controls"><input id="q" placeholder="Search inventory"><select id="filter"><option value="">All teams</option></select><button id="refresh" class="btn secondary">Refresh</button></div>
<div class="tablewrap"><table><thead><tr><th>Code</th><th>Team</th><th>Number</th><th>Name</th><th>Quantity</th><th>Image / Upload</th><th>Actions</th></tr></thead><tbody id="rows"></tbody></table></div></div></section></main>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="config.js"></script><script src="assets/admin.js?v=4"></script></body></html>
